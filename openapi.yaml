openapi: 3.1.0
info:
  title: ThermoMind Continuity Layer API
  version: 1.0.0
  description: >
    A model-agnostic continuity engine providing surplus, drift, stability,
    identity fingerprinting, and long-term memory for LLM agents.

servers:
  - url: https://thermomind-production.up.railway.app

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: >
        Raw API key string (e.g. tm_p1_..., tm_p2_..., tm_eng_...) — not a JWT.
        Pass it as: Authorization: Bearer <your_key>

  schemas:
    Session:
      type: object
      properties:
        status:
          type: string
          description: "'session created' for a new session, 'session synchronized' if external_id already existed."
          example: "session created"
        session_id:
          type: string
          format: uuid
        external_id:
          type: string
          nullable: true

    Event:
      type: object
      required: [type]
      properties:
        type:
          type: string
          example: "message"
        content:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
          example: "user"
        data:
          type: object
          nullable: true

    CycleUpdate:
      type: object
      properties:
        status:
          type: string
          example: "cycle_computed"
        regime:
          type: string
          description: "'stable', 'drift', or 'noisy'"
        prediction_gap:
          type: number
        phi:
          type: number
          description: "Consciousness/coherence metric (Φ), 0.0-1.0"
        boredom:
          type: boolean
        mental_state:
          type: string

    State:
      type: object
      properties:
        session_id:
          type: string
        external_id:
          type: string
          nullable: true
        cycle:
          type: integer
        phi:
          type: number
        grade:
          type: string
          description: "A+, A, B, C, or Initializing — derived from phi"
        energy_reserve:
          type: number
        vitality:
          type: number
        surplus:
          type: number
        drift:
          type: number
        stability:
          type: number
        regime:
          type: string
        mental_state:
          type: string
        boredom_flag:
          type: boolean
        traits:
          type: object
        self_model:
          type: object

    MemoryWrite:
      type: object
      required: [content]
      properties:
        kind:
          type: string
          default: "fact"
        content:
          type: string
        importance:
          type: number
          default: 0.5

    MemoryWriteResponse:
      type: object
      properties:
        status:
          type: string
          example: "memory_stored"
        kind:
          type: string
        importance:
          type: number

    GuidanceRequest:
      type: object
      properties:
        context:
          type: string
          default: ""
        max_hints:
          type: integer
          default: 3

    GuidanceResponse:
      type: object
      properties:
        session_id:
          type: string
        agent:
          type: string
        cycles:
          type: integer
        phi:
          type: number
        surplus:
          type: number
        drift:
          type: number
        stability:
          type: number
        regime:
          type: string
        boredom:
          type: boolean
        memory_ranked_by_salience:
          type: boolean
        hints:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

security:
  - ApiKeyAuth: []

paths:

  /v1/sessions:
    post:
      summary: Create a new continuity session, or resume an existing one by external_id
      operationId: createSession
      security:
        - ApiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                external_id:
                  type: string
                  nullable: true
                  description: >
                    Your own identifier for this session (e.g. a user ID or
                    agent name). If a session with this external_id already
                    exists under your API key, that session is returned
                    instead of creating a new one.
                metadata:
                  type: object
                  nullable: true
      responses:
        '200':
          description: Session created or synchronized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Monthly cycles and pack cycles both exhausted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: external_id already claimed by a different API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/sessions/{session_id}/events:
    post:
      summary: Append an event and trigger a continuity cycle update
      operationId: appendEvent
      security:
        - ApiKeyAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: Either the session_id returned from createSession, or the external_id you originally provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '200':
          description: Cycle computed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CycleUpdate'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/sessions/{session_id}/state:
    get:
      summary: Get current continuity metrics for the session
      operationId: getState
      security:
        - ApiKeyAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current continuity state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/State'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/sessions/{session_id}/memory:
    post:
      summary: Write a memory item directly (outside the normal event/cycle flow)
      operationId: writeMemory
      security:
        - ApiKeyAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryWrite'
      responses:
        '200':
          description: Memory stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryWriteResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/sessions/{session_id}/guidance:
    post:
      summary: Generate continuity-aware guidance hints for LLM prompting
      operationId: getGuidance
      security:
        - ApiKeyAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuidanceRequest'
      responses:
        '200':
          description: Guidance generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuidanceResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
